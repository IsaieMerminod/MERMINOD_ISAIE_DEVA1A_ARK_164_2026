{% extends "base.html" %}
{% block title %} Supprimer une CREATURE {% endblock %}
{% block body %}
<div class="container">
	<div class="row">
		<div class="col-md-12">
			<div class="alert alert-danger">
				<h4 class="alert-heading">Suppression d'une créature</h4>
				<p>Voulez-vous vraiment supprimer définitivement cette créature de votre base ARK ?</p>
			</div>
			<form action="{{ url_for('creatures_delete_wtf') }}" method="POST">
				<input type="hidden" name="id_creature_btn_delete_html" value="{{ data_delete.ID_Creature }}">

				<div class="form-group">
					<label>Nom de la créature :</label>
					<input type="text" class="form-control" value="{{ data_delete.Nom }}" readonly>
				</div>
				<br>
				<button type="submit" class="btn btn-danger">Confirmer la suppression</button>
				<a href="{{ url_for('creatures_afficher', order_by='ASC', id_creature_sel=0) }}" class="btn btn-secondary">Annuler</a>
			</form>
		</div>
	</div>
</div>
{% endblock %}
